<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Xerox Editor</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <link rel="stylesheet" href="style.css">
    <script src="neutralino.js" defer></script>
    <script src="script.js" defer></script>
    <style>
        #main:not(.editorActive) .landing-ele {}

        #main:not(.editorActive) .editor-ele {
            display: none;
        }

        #main.editorActive .landing-ele {
            display: none;
        }

        #main.editorActive .editor-ele {}
    </style>
</head>

<body id="main"
    class="bg-slate-50 text-slate-900 font-sans h-screen overflow-hidden flex flex-col selection:bg-indigo-100">

    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-inner">
                <svg viewBox="-2.4 -2.4 28.80 28.80" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="none">
                    <path
                        d="M16.9,3 C17.467,3 17.9338222,3.4290048 17.9935452,3.9801417 L18,4.1 L18,7 L19,7 C20.597725,7 21.903664,8.24892392 21.9949075,9.82372764 L22,10 L22,17 C22,18.0543909 21.18415,18.9181678 20.1492661,18.9945144 L20,19 L18,19 L18,20.9 C18,21.467 17.5709778,21.9338222 17.0198548,21.9935452 L16.9,22 L7.1,22 C6.53299067,22 6.06617653,21.5709778 6.00645469,21.0198548 L6,20.9 L6,19 L4,19 C2.94563773,19 2.08183483,18.18415 2.00548573,17.1492661 L2,17 L2,10 C2,8.40232321 3.24892392,7.09633941 4.82372764,7.00509271 L5,7 L6,7 L6,4.1 C6,3.53299067 6.42901351,3.06617653 6.98014344,3.00645469 L7.1,3 L16.9,3 Z M16,16 L8,16 L8,20 L16,20 L16,16 Z M19,9 L5,9 C4.48716857,9 4.06449347,9.38604429 4.0067278,9.88337975 L4,10 L4,17 L6,17 L6,15.1 C6,14.533 6.42901351,14.0661778 6.98014344,14.0064548 L7.1,14 L16.9,14 C17.467,14 17.9338222,14.4290222 17.9935452,14.9801452 L18,15.1 L18,17 L20,17 L20,10 C20,9.44772 19.5523,9 19,9 Z M17,10 C17.5523,10 18,10.4477 18,11 C18,11.51285 17.613973,11.9355092 17.1166239,11.9932725 L17,12 L15,12 C14.4477,12 14,11.5523 14,11 C14,10.48715 14.386027,10.0644908 14.8833761,10.0067275 L15,10 L17,10 Z M16,5 L8,5 L8,7 L16,7 L16,5 Z"
                        fill="currentColor"> </path>
                </svg>
            </div>
            <h1 class="font-bold text-xl tracking-tight text-slate-800 cursor-default">Xerox Editor</h1>
        </div>

        <div class="flex items-center gap-3 editor-ele">
            <button id="resetAll"
                class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">
                Reset All
            </button>
            <button id="saveBtn"
                class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 rounded-lg shadow-sm shadow-indigo-200 transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Save as New
            </button>
        </div>
    </header>

    <main class="flex-1 flex min-h-0 relative">

        <div id="canvasWrapper"
            class="flex-1 bg-slate-100 relative overflow-hidden flex items-center justify-center cursor-default select-none">

            <div class="absolute inset-0 opacity-[0.03]"
                style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 20px 20px;"></div>

            <div id="landing" class="landing-ele text-center z-10 p-10">
                <div id="imgIco"
                    class="cursor-pointer w-24 h-24 bg-white rounded-3xl shadow-xl shadow-indigo-100 flex items-center justify-center mx-auto mb-6 transform rotate-3 transition-transform hover:rotate-0">
                    <svg class=" w-10 h-10 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">Choose Image</h2>
                <p class="text-slate-500 mb-8 max-w-xs mx-auto">Supports JPG, JPEG, PNG.</p>

                <button id="chooseBtn"
                    class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl shadow-lg shadow-indigo-200 hover:shadow-indigo-300 transition-all transform hover:-translate-y-0.5">
                    Browse Files
                </button>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
            </div>

            <canvas id="perspectiveCanvas"
                class="shadow-2xl editor-ele transition-transform duration-75 ease-out origin-center"></canvas>

            <div
                class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur px-4 py-2 rounded-full shadow-lg border border-slate-200 text-xs text-slate-500 pointer-events-none editor-ele flex gap-4">
                <span class="flex items-center gap-1.5"><kbd
                        class="bg-slate-100 border border-slate-300 rounded px-1.5 py-0.5 font-sans">Space</kbd> + Drag
                    to Pan</span>
                <span class="flex items-center gap-1.5"><kbd
                        class="bg-slate-100 border border-slate-300 rounded px-1.5 py-0.5 font-sans">Scroll</kbd> to
                    Zoom</span>
            </div>
        </div>

        <aside
            class="w-80 bg-white border-l border-slate-200 flex flex-col p-6 overflow-y-auto shrink-0 z-40 editor-ele">

            <div class="space-y-6">
                <div>
                    <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Geometry</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="cropResetBtn"
                            class="flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 hover:border-indigo-600 hover:text-indigo-600 hover:bg-indigo-50 transition-all group">
                            <svg class="w-6 h-6 mb-2 text-slate-400 group-hover:text-indigo-600" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                            </svg>
                            <span class="text-xs font-medium">Reset Crop</span>
                        </button>
                        <button id="rotateResetBtn"
                            class="flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 hover:border-indigo-600 hover:text-indigo-600 hover:bg-indigo-50 transition-all group">
                            <svg class="w-6 h-6 mb-2 text-slate-400 group-hover:text-indigo-600" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            <span class="text-xs font-medium">Reset Rot</span>
                        </button>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-3">
                        <button id="rotateLeftBtn"
                            class="py-2 px-3 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-medium transition-colors">
                            ↺ -90°
                        </button>
                        <button id="rotateRightBtn"
                            class="py-2 px-3 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-medium transition-colors">
                            ↻ +90°
                        </button>
                    </div>
                </div>

                <hr class="border-slate-100">

                <div>
                    <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Enhancement</h3>

                    <div class="mb-5 group">
                        <div class="flex justify-between text-sm mb-2">
                            <span class="font-medium text-slate-600">Brightness</span>
                            <span id="brightnessVal" class="text-indigo-600 font-bold tabular-nums">100</span>
                        </div>
                        <input type="range" id="brightnessInput" min="0" max="200" value="100"
                            class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600 hover:accent-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
                    </div>

                    <div class="mb-5 group">
                        <div class="flex justify-between text-sm mb-2">
                            <span class="font-medium text-slate-600">Contrast</span>
                            <span id="contrastVal" class="text-indigo-600 font-bold tabular-nums">100</span>
                        </div>
                        <input type="range" id="contrastInput" min="0" max="200" value="100"
                            class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600 hover:accent-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
                    </div>

                    <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-white rounded-lg text-slate-400">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                                </svg>
                            </div>
                            <span class="text-sm font-medium text-slate-700">B&W Mode</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="grayscaleToggle" class="sr-only peer">
                            <div
                                class="w-10 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600">
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="mt-auto pt-6 border-t border-slate-100 text-center">
                <button id="ClearWorkspace"
                    class="w-full py-2.5 text-red-500 font-bold text-sm hover:bg-red-50 rounded-xl transition-colors flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Close Image
                </button>
            </div>

        </aside>

    </main>
</body>

</html>
